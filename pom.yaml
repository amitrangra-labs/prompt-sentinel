modelVersion: 4.0.0

groupId: io.promptsentinel
artifactId: prompt-sentinel
version: 0.1.0
packaging: jar

name: prompt-sentinel
description: A prompt firewall for Claude and other LLMs — classifies, rewrites, or blocks risky prompts before they reach the model.
url: https://github.com/amitrangra-labs/prompt-sentinel

properties:
  maven.compiler.release: '26'
  project.build.sourceEncoding: UTF-8
  junit.version: 5.11.0
  jackson.version: 3.0.3
  mcp.version: 1.1.3

dependencies:
  # MCP server framework
  - groupId: io.modelcontextprotocol.sdk
    artifactId: mcp
    version: ${mcp.version}

  # JSON + YAML (rule files + MCP protocol serialisation)
  # Jackson 3 — must match what mcp-json-jackson3 uses (tools.jackson.* packages)
  - groupId: tools.jackson.core
    artifactId: jackson-databind
    version: ${jackson.version}
  - groupId: tools.jackson.dataformat
    artifactId: jackson-dataformat-yaml
    version: ${jackson.version}

  # Logging (SLF4J simple for stdio-safe output — logs to stderr)
  - groupId: org.slf4j
    artifactId: slf4j-simple
    version: 2.0.13

  # Test
  - groupId: org.junit.jupiter
    artifactId: junit-jupiter
    version: ${junit.version}
    scope: test
  - groupId: org.assertj
    artifactId: assertj-core
    version: 3.26.0
    scope: test

build:
  plugins:
    - groupId: org.apache.maven.plugins
      artifactId: maven-compiler-plugin
      version: 3.13.0
      configuration:
        release: '26'

    - groupId: org.apache.maven.plugins
      artifactId: maven-surefire-plugin
      version: 3.3.0
      configuration:
        useModulePath: false

    # Fat JAR — `mvn package` produces prompt-sentinel-0.1.0.jar
    - groupId: org.apache.maven.plugins
      artifactId: maven-assembly-plugin
      version: 3.7.0
      executions:
        - id: fat-jar
          phase: package
          goals: [single]
          configuration:
            archive:
              manifest:
                mainClass: io.promptsentinel.server.PromptSentinelServer
            descriptorRefs: [jar-with-dependencies]
            appendAssemblyId: false
            finalName: ${project.artifactId}-${project.version}
